---
include:
  # Left half (peripheral) - no Studio; flash this to the left side
  - board: nice_nano_v2
    shield: charybdis_left
  # Right half (USB/central) - with ZMK Studio; flash this to the side you plug USB into
  - board: nice_nano_v2
    shield: charybdis_right
    snippet: studio-rpc-usb-uart
    cmake-args:
      - -DCONFIG_ZMK_STUDIO=y
      - -DCONFIG_ZMK_STUDIO_LOCKING=n
  - board: nice_nano_v2
    shield: settings_reset
