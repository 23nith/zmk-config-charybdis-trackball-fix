---
include:
  # Left half (peripheral)
  - board: nice_nano//zmk
    shield: charybdis_left
  # Right half (USB/central) - with ZMK Studio; flash this to the side you plug USB into
  - board: nice_nano//zmk
    shield: charybdis_right
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
  - board: nice_nano//zmk
    shield: settings_reset
