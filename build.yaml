---
include:
  # Left half (peripheral)
  - board: nice_nano_v2
    shield: charybdis_left
  # Right half (central) - with ZMK Studio; flash this to the half you connect via BLE
  - board: nice_nano_v2
    shield: charybdis_right
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
  - board: nice_nano_v2
    shield: settings_reset
